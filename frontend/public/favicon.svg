<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#2f8cff"/>
  <!-- Anchor -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor ring at top -->
    <circle cx="32" cy="16" r="5"/>
    <!-- Anchor vertical shaft -->
    <line x1="32" y1="21" x2="32" y2="50"/>
    <!-- Anchor crossbar -->
    <line x1="20" y1="28" x2="44" y2="28"/>
    <!-- Anchor left curve -->
    <path d="M32 50 C32 50 20 46 20 38"/>
    <!-- Anchor right curve -->
    <path d="M32 50 C32 50 44 46 44 38"/>
    <!-- Left tip -->
    <line x1="16" y1="38" x2="24" y2="38"/>
    <!-- Right tip -->
    <line x1="40" y1="38" x2="48" y2="38"/>
  </g>
</svg>
