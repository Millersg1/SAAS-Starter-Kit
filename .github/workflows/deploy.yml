# Deploys to production on push to main, or manually via workflow_dispatch.
# Staging can be triggered manually with environment=staging.

name: Deploy SAAS Surface

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: saassurface_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: ./backend
      - run: npm test
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: saassurface_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret-key
          NODE_ENV: test

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: ./frontend

      - run: npm run build
        working-directory: ./frontend

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude 'api.saassurface.com' \
            --exclude '.well-known' \
            --exclude 'cgi-bin' \
            ./frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync backend files
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'uploads' \
            --exclude 'logs' \
            ./backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/api.saassurface.com/

      - name: Install deps and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/public_html/api.saassurface.com
            npm install --production
            pm2 restart saassurface-api --update-env 2>/dev/null || pm2 start ecosystem.config.cjs --env production

  health-check:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Wait for server
        run: sleep 15

      - name: Health check
        run: |
          response=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 15 "https://api.saassurface.com/health")
          if [ "$response" -ne 200 ]; then
            echo "Health check FAILED (status $response)"
            exit 1
          fi
          echo "API healthy (200)"

      - name: Notify success
        if: success()
        run: echo "Deployment to ${{ github.event.inputs.environment || 'production' }} succeeded"
