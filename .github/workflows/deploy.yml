# This is a GitHub Actions workflow file that automates the deployment of your application.
# It will trigger automatically whenever you push changes to your 'main' branch.

name: Deploy ClientHub Application

on:
  push:
    branches:
      - main # Or your primary branch, e.g., master

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a version compatible with your project
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: 🏗️ Build frontend assets
        run: npm run build
        working-directory: ./frontend

      - name: 🔑 Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔍 Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to server with rsync
        run: |
          # Exclude the backend folder so it doesn't get deleted!
          # Also exclude standard cPanel folders like cgi-bin and .well-known (SSL)
          rsync -avz --delete --exclude 'api.faithharborclienthub.com' --exclude '.well-known' --exclude 'cgi-bin' ./frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend # Optional: Run after frontend deployment
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔍 Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Sync backend files
        run: |
          # Syncs the backend folder from GitHub to the server
          rsync -avz --delete --exclude 'node_modules' --exclude '.env' --exclude 'uploads' ./backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/api.faithharborclienthub.com/

      - name: 🚀 Deploy and restart server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # These commands run ON the server
            cd ~/public_html/api.faithharborclienthub.com
            echo "📦 Installing npm dependencies on server..."
            npm install --production
            
            echo "🔄 Restarting application with PM2..."
            pm2 restart clienthub-api --update-env 2>/dev/null || pm2 start ecosystem.config.js --env production

  health-check:
    name: Verify API Health
    runs-on: ubuntu-latest
    needs: deploy-backend # Run this job after the backend is deployed
    steps:
      - name: 😴 Wait for server to initialize
        run: sleep 15

      - name: 💚 Ping health check endpoint
        run: |
          response=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 15 "https://api.faithharborclienthub.com/health")
          if [ "$response" -ne 200 ]; then
            echo "Health check failed with status $response!"
            exit 1
          fi
          echo "API is healthy and responding with status 200."